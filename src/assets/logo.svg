<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 138" fill="none">
  <!-- Robot: large cream circle -->
  <circle cx="67" cy="62" r="56" fill="#e3d9c3"/>

  <!-- Robot face plate (dark oval overlapping right of circle) -->
  <ellipse cx="88" cy="69" rx="35" ry="30" fill="#0d1020"/>

  <!-- Antenna: line + ball -->
  <line x1="74" y1="42" x2="53" y2="13" stroke="#0d1020" stroke-width="4" stroke-linecap="round"/>
  <circle cx="51" cy="11" r="7" fill="#0d1020"/>

  <!-- Left sensor circle (inside main circle, left of face plate) -->
  <circle cx="52" cy="72" r="10" fill="#0d1020"/>

  <!-- Eyes on face plate -->
  <circle cx="82" cy="69" r="6" fill="#cec2a8"/>
  <circle cx="100" cy="69" r="6" fill="#cec2a8"/>

  <!-- ROBOTS text -->
  <text
    x="143" y="60"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', Arial, sans-serif"
    font-weight="900"
    font-size="48"
    fill="white"
  >ROBOTS</text>

  <!-- CONSULTANT text -->
  <text
    x="143" y="112"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', Arial, sans-serif"
    font-weight="900"
    font-size="48"
    fill="white"
  >CONSULTANT</text>

  <!-- AGENCY label with lines -->
  <line x1="143" y1="126" x2="262" y2="126" stroke="rgba(255,255,255,0.38)" stroke-width="1.4"/>
  <text
    x="318" y="131"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12"
    font-weight="300"
    letter-spacing="6"
    fill="rgba(255,255,255,0.58)"
  >AGENCY</text>
  <line x1="372" y1="126" x2="490" y2="126" stroke="rgba(255,255,255,0.38)" stroke-width="1.4"/>
</svg>
