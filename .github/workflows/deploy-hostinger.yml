# Despliegue automático a Hostinger por FTP.
#
# Para activarlo, añade en GitHub → Settings → Secrets and variables →
# Actions → New repository secret, estos tres secrets (los datos están en
# hPanel → Archivos → Cuentas FTP):
#
#   FTP_SERVER    → p. ej. ftp.robotsconsultant.net  (o la IP que da hPanel)
#   FTP_USERNAME  → el usuario FTP de hPanel
#   FTP_PASSWORD  → su contraseña
#
# Opcional: si tu carpeta web no es la raíz del usuario FTP, ajusta
# server-dir (p. ej. "public_html/" o "domains/robotsconsultant.net/public_html/").
#
# Mientras los secrets no existan, el workflow se salta sin fallar.
# (Se activa automáticamente al detectar FTP_SERVER: no requiere variables.)

name: Deploy a Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  # GitHub no permite leer secrets en el `if` de un job: se comprueba aquí
  # y el job de deploy depende del resultado.
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: echo "configured=${{ env.FTP_SERVER != '' }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.configured == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # dist/ va versionado en el repo, así que no hace falta build aquí.
      # Si algún día se deja de versionar, añadir: npm ci && npm run build:ssg
      - name: Subir dist/ por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: dist/
          # La cuenta FTP de Hostinger ya apunta dentro de public_html
          server-dir: ./
          dangerous-clean-slate: false
